name: Robot Framework CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

  # ── ADDED SCHEDULE TO TRIGGER AUTOMATICALLY AT 4:00 AM ICT (21:00 UTC) ──
  schedule:
    - cron: '0 21 * * *'
  # ────────────────────────────────────────────────────────────────────────

# ── ADD THIS EXACT LINE TO SHOW THE TIMEOUT BANNER & MANUAL BUTTON ──
  workflow_dispatch:

jobs:
  test-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Google Chrome (Headless)
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install robotframework robotframework-seleniumlibrary requests robotframework-requests

    - name: Execute Robot Framework Smoke Tests
      # We force HEADLESS:True via command line variable override since GitHub runners don't have screens
      run: |
        robot --variable BROWSER:headlesschrome --variable HEADLESS:True --include smoke --outputdir reports tests/

    - name: Archive Test Execution Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: robot-test-reports
        path: reports/